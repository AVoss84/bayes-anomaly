<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
  <title>BHAD — Bayesian Histogram Anomaly Detection</title>
  <defs>
    <!-- Gradient for normal histogram bars -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <!-- Gradient for anomaly bar -->
    <linearGradient id="anomalyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <!-- Glow filter for anomaly bar -->
    <filter id="anomalyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow for the icon group -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4338ca" flood-opacity="0.18"/>
    </filter>
    <!-- Pulse ring for anomaly dot -->
    <filter id="pulseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- === Icon group: histogram in a rounded container === -->
  <g filter="url(#iconShadow)">
    <!-- Dark rounded card behind histogram -->
    <rect x="30" y="20" width="220" height="200" rx="20" fill="#1e1b4b"/>
    <!-- Subtle grid lines -->
    <line x1="50" y1="80" x2="232" y2="80" stroke="#312e81" stroke-width="0.8" stroke-dasharray="4 4"/>
    <line x1="50" y1="120" x2="232" y2="120" stroke="#312e81" stroke-width="0.8" stroke-dasharray="4 4"/>
    <line x1="50" y1="160" x2="232" y2="160" stroke="#312e81" stroke-width="0.8" stroke-dasharray="4 4"/>

    <!-- Histogram bars — bell-shaped distribution -->
    <!-- Bar positions: x starts at 52, width=22, gap=4 -->
    <rect x="52"  y="172" width="22" height="24" rx="4" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="78"  y="156" width="22" height="40" rx="4" fill="url(#barGrad)" opacity="0.75"/>
    <rect x="104" y="128" width="22" height="68" rx="4" fill="url(#barGrad)" opacity="0.88"/>
    <rect x="130" y="92"  width="22" height="104" rx="4" fill="url(#barGrad)"/>
    <rect x="156" y="100" width="22" height="96" rx="4" fill="url(#barGrad)" opacity="0.92"/>
    <rect x="182" y="148" width="22" height="48" rx="4" fill="url(#barGrad)" opacity="0.7"/>

    <!-- Anomaly bar — tall spike on the right, with glow -->
    <rect x="212" y="40" width="22" height="156" rx="4" fill="url(#anomalyGrad)" filter="url(#anomalyGlow)"/>

    <!-- Baseline -->
    <line x1="48" y1="197" x2="238" y2="197" stroke="#6366f1" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>

    <!-- Anomaly warning icon (⚠ triangle) at the top of the spike -->
    <g transform="translate(223, 28)">
      <!-- Outer glow ring -->
      <circle cx="0" cy="0" r="10" fill="#f97316" filter="url(#pulseGlow)" opacity="0.5"/>
      <!-- Warning triangle -->
      <path d="M0-8 L7 5 L-7 5 Z" fill="none" stroke="#fbbf24" stroke-width="1.8" stroke-linejoin="round"/>
      <line x1="0" y1="-3" x2="0" y2="1" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="0" cy="3.5" r="0.9" fill="#fbbf24"/>
    </g>
  </g>

  <!-- === Text group === -->
  <!-- BHAD wordmark — bold, modern -->
  <text x="280" y="135" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-3" fill="#1e1b4b">BHAD</text>

  <!-- Subtitle -->
  <text x="284" y="168" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15.5" font-weight="500" fill="#6366f1" letter-spacing="0.5">Bayesian Histogram Anomaly Detection</text>

  <!-- Tagline -->
  <text x="284" y="192" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#94a3b8" letter-spacing="0.3">Unsupervised · Explainable · Bayesian</text>
</svg>